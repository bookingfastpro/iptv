server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache long terme pour les assets hashés
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA manifest + service worker : pas de cache
    location ~* (manifest\.json|sw\.js)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA : toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
